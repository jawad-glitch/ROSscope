# ROSscope Production Stack
# Runs: Prometheus, Grafana, TimescaleDB
#
# The ROSscope collector runs natively on the host (not in Docker)
# because it needs direct access to the ROS 2 DDS middleware.
#
# Quickstart:
#   1. docker compose -f docker-compose.prod.yml up -d
#   2. pip3 install -r requirements.txt
#   3. source /opt/ros/humble/setup.bash
#   4. python3 main.py

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: rosscope_timescaledb
    network_mode: host
    environment:
      - POSTGRES_USER=rosscope
      - POSTGRES_PASSWORD=rosscope
      - POSTGRES_DB=rosscope
    volumes:
      - timescaledb_data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    container_name: rosscope_prometheus
    network_mode: host
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: rosscope_grafana
    network_mode: host
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=rosscope
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./dashboard/provisioning:/etc/grafana/provisioning
      - ./dashboard:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
  timescaledb_data:
